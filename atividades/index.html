<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atividades - Pajeú</title>

  <style>
    @font-face {
      font-family: 'pajeutitulo';
      src: url('../fonts/chinese rocks rg.otf') format('opentype');
    }

    @font-face {
      font-family: 'pajeutexto';
      src: url('../fonts/Montserrat-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
    }

    @font-face {
      font-family: 'pajeutexto';
      src: url('../fonts/Montserrat-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
    }

    @font-face {
      font-family: 'pajeutexto';
      src: url('../fonts/Montserrat-Italic.otf') format('opentype');
      font-weight: 400;
      font-style: italic;
    }

    @font-face {
      font-family: 'pajeutexto';
      src: url('../fonts/Montserrat-BoldItalic.otf') format('opentype');
      font-weight: 700;
      font-style: italic;
    }

    :root {
      --bordo: #7a0c0c;
      --bordo-esc: #4d0707;
      --ouro: #e8b84b;
      --creme: #f4ede0;
      --creme2: #ede3d0;
      --branco: #fff8f0;
      --texto: #1a0808;

      --font-display: 'pajeutitulo', sans-serif;
      --font-body: 'pajeutexto', Georgia, serif;
      --font-ui: 'pajeutitulo', 'pajeutexto', serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--creme);
      color: var(--texto);
      font-family: var(--font-body);
    }

    header {
      background: var(--bordo-esc);
      border-bottom: 3px solid var(--ouro);
      padding: 1.2rem 2rem;
    }

    header a {
      color: var(--ouro);
      text-decoration: none;
      font-family: var(--font-ui);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: .85rem;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 1.5rem;
    }

    .label {
      font-family: var(--font-body);
      font-size: .50rem;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--ouro);
      margin-bottom: .75rem;
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    .label::after {
      content: "";
      flex: 1;
      height: 1px;
      background: currentColor;
      opacity: .35;
    }

    h1 {
      font-family: var(--font-display);
      color: var(--bordo-esc);
      font-size: clamp(2rem, 7vw, 4.5rem);
      line-height: 1;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .sub {
      max-width: 680px;
      line-height: 1.75;
      color: #5a3030;
      margin-bottom: 2rem;
    }

    .busca {
      margin: 2rem 0 2.5rem;
    }

    .busca input {
      width: 100%;
      padding: .9rem 1rem;
      border: 2px solid #d8c8b8;
      background: var(--branco);
      font-family: var(--font-body);
      font-size: 1rem;
      color: var(--texto);
    }

    .busca input:focus {
      outline: none;
      border-color: var(--bordo);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--branco);
      border-top: 4px solid var(--bordo);
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(122,12,12,.15);
    }

    .card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: #2a0808;
    }

    .card-body {
      padding: 1.35rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
      flex: 1;
    }

    .data {
      font-family: var(--font-ui);
      font-size: .7rem;
      letter-spacing: .12em;
      color: var(--bordo);
      text-transform: uppercase;
    }

    .card h2 {
      font-family: var(--font-display);
      color: var(--bordo-esc);
      font-size: 1.55rem;
      line-height: 1.05;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .desc {
      font-size: .86rem;
      line-height: 1.65;
      color: #4a2a2a;
      flex: 1;
    }

    .ver {
      font-family: var(--font-ui);
      font-size: .72rem;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: var(--bordo);
      margin-top: .5rem;
    }

    .vazio {
      background: var(--branco);
      border-left: 4px solid var(--bordo);
      padding: 1.25rem;
      color: #5a3030;
      line-height: 1.6;
    }

    mark {
      background: transparent;
      color: var(--bordo);
      font-weight: 700;
    }

    @media (max-width: 680px) {
      header {
        padding: 1rem 1.25rem;
      }

      .container {
        padding: 3rem 1.25rem;
      }

      .card-img {
        height: 210px;
      }
    }
  </style>
</head>

<body>
  <header>
    <a href="/">← Voltar ao início</a>
  </header>

  <main class="container">
    <div class="label">Atividades</div>
    <h1>Formação, luta e organização</h1>

    <p class="sub">
      Acompanhe atividades, formações, encontros e eventos do Pajeú.
      Aqui também será possível acessar certificados vinculados às atividades realizadas.
    </p>

    <div class="busca">
      <input
        type="search"
        id="buscaAtividades"
        placeholder="Pesquisar por título, descrição ou palavra-chave..."
        oninput="filtrarAtividades()"
      />
    </div>

    <div id="atividadesGrid" class="grid"></div>
  </main>

  <script>
    const grid = document.getElementById("atividadesGrid");
    const busca = document.getElementById("buscaAtividades");

    function ls(key, fallback = []) {
      try {
        return JSON.parse(localStorage.getItem(key)) || fallback;
      } catch {
        return fallback;
      }
    }

    function formatarData(data) {
      if (!data) return "";
      const d = new Date(data + "T00:00:00");
      if (isNaN(d)) return data;
      return d.toLocaleDateString("pt-BR");
    }

    function primeiraFoto(atividade) {
      if (atividade.fotos && atividade.fotos.length) {
        return atividade.fotos[0];
      }
      return "";
    }

    function textoBusca(atividade) {
      return [
        atividade.titulo || "",
        atividade.descricao || "",
        atividade.data || "",
        ...(atividade.certificados || []).flatMap(c => [
          c.cargaHoraria || "",
          c.texto || "",
          ...(c.participantes || [])
        ])
      ].join(" ").toLowerCase();
    }

    function renderAtividades(lista) {
      if (!lista.length) {
        grid.innerHTML = `
          <div class="vazio">
            Nenhuma atividade encontrada.
          </div>
        `;
        return;
      }

      grid.innerHTML = lista.map(a => {
        const foto = primeiraFoto(a);

        return `
          <a class="card" href="atividade.html?id=${encodeURIComponent(a.id)}">
            ${foto ? `<img src="${foto}" alt="Imagem da atividade" class="card-img">` : ""}

            <div class="card-body">
              <div class="data">${a.data ? formatarData(a.data) : "Atividade"}</div>
              <h2>${a.titulo || "Atividade sem título"}</h2>
              <p class="desc">${a.descricao || "Sem descrição cadastrada."}</p>
              <span class="ver">Ver atividade →</span>
            </div>
          </a>
        `;
      }).join("");
    }

    function filtrarAtividades() {
      const termo = busca.value.trim().toLowerCase();
      const atividades = ls("pajeu_atividades", []);

      const ordenadas = atividades.sort((a, b) => {
        return new Date(b.criadoEm || b.data || 0) - new Date(a.criadoEm || a.data || 0);
      });

      if (!termo) {
        renderAtividades(ordenadas);
        return;
      }

      const filtradas = ordenadas.filter(a => textoBusca(a).includes(termo));
      renderAtividades(filtradas);
    }

    filtrarAtividades();
  </script>
</body>
</html>
