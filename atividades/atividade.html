<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atividade - Pajeú</title>

  <style>
    @font-face {
      font-family: 'pajeutitulo';
      src: url('../fonts/chinese rocks rg.otf') format('opentype');
    }

    @font-face {
      font-family: 'pajeutexto';
      src: url('../fonts/Montserrat-Regular.otf') format('opentype');
    }

    :root{
      --bordo:#7a0c0c;
      --bordoEsc:#4d0707;
      --ouro:#e8b84b;
      --creme:#f4ede0;
      --texto:#2d1111;

      --font-display:'pajeutitulo', sans-serif;
      --font-body:'pajeutexto', sans-serif;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--creme);
      color:var(--texto);
      font-family:var(--font-body);
    }

    header{
      background:var(--bordoEsc);
      border-bottom:3px solid var(--ouro);
      padding:1rem 2rem;
    }

    header a{
      color:var(--ouro);
      text-decoration:none;
      font-family:var(--font-display);
      letter-spacing:.1em;
      font-size:.8rem;
    }

    .container{
      max-width:1000px;
      margin:auto;
      padding:3rem 1.5rem 5rem;
    }

    .data{
      color:var(--bordo);
      font-size:.8rem;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:1rem;
    }

    h1{
      font-family:var(--font-display);
      color:var(--bordoEsc);
      font-size:clamp(2.5rem,6vw,3rem);
      line-height:1;
      margin-bottom:2rem;
      text-transform:uppercase;
      letter-spacing:.05em;
    }

    .descricao{
      line-height:1.9;
      font-size:1rem;
      color:#4a2a2a;
      margin-bottom:3rem;
    }

    .galeria{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:1rem;
      margin-bottom:4rem;
    }

    .galeria img{
      width:100%;
      height:260px;
      object-fit:cover;
      border:2px solid rgba(122,12,12,.12);
    }

    .sec-title{
      font-family:var(--font-display);
      color:var(--bordoEsc);
      font-size:2rem;
      letter-spacing:.08em;
      margin-bottom:1.5rem;
      text-transform:uppercase;
    }

    .certs{
      display:grid;
      gap:1rem;
    }

    .cert{
      background:#fffaf3;
      border-left:4px solid var(--bordo);
      padding:1.2rem;
    }

    .cert-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:1rem;
      flex-wrap:wrap;
    }

    .cert h3{
      color:var(--bordoEsc);
      font-size:1rem;
    }

    .carga{
      color:#6b4444;
      font-size:.9rem;
      margin-top:.35rem;
    }

    .btn{
      border:none;
      background:var(--bordo);
      color:#fff;
      padding:.8rem 1rem;
      cursor:pointer;
      font-family:var(--font-display);
      letter-spacing:.08em;
      text-transform:uppercase;
      font-size:.75rem;
    }

    .participantes{
      margin-top:1rem;
      display:none;
    }

    .participantes input{
      width:100%;
      padding:.85rem;
      border:1px solid #d7c7b6;
      margin-bottom:.75rem;
      font-family:var(--font-body);
    }

    .erro{
      background:#fff5f5;
      border-left:4px solid #b30000;
      padding:1rem;
      color:#7a0000;
      line-height:1.7;
    }
  </style>
</head>

<body>

<header>
  <a href="index.html">← Voltar para atividades</a>
</header>

<main class="container">

  <div id="conteudo"></div>

</main>


  

</body>
</html>
