<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Contato - Pajeú</title>

  <style>
    @font-face {
      font-family: 'pajeutitulo';
      src: url('../fonts/chinese rocks rg.otf') format('opentype');
    }

    @font-face {
      font-family: 'pajeutexto';
      src: url('../fonts/Montserrat-Regular.otf') format('opentype');
    }

    :root {
      --bordo: #7a0c0c;
      --bordo-esc: #4d0707;
      --ouro: #e8b84b;
      --creme: #f4ede0;
      --branco: #fff8f0;
      --texto: #1a0808;

      --font-display: 'pajeutitulo', sans-serif;
      --font-body: 'pajeutexto', sans-serif;
      --font-ui: 'pajeutitulo', sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--creme);
      color: var(--texto);
      font-family: var(--font-body);
    }

    header {
      background: var(--bordo-esc);
      border-bottom: 3px solid var(--ouro);
      padding: 1.2rem 2rem;
    }

    header a {
      color: var(--ouro);
      text-decoration: none;
      font-family: var(--font-ui);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: .85rem;
    }

    .page {
      max-width: 1100px;
      margin: 0 auto;
      padding: 4rem 2rem;
    }

    .label {
      color: var(--ouro);
      letter-spacing: .25em;
      text-transform: uppercase;
      font-size: .75rem;
      margin-bottom: .8rem;
    }

    h1 {
      font-family: var(--font-display);
      color: var(--bordo-esc);
      font-size: clamp(2.5rem, 7vw, 5rem);
      line-height: .95;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-bottom: 3rem;
    }

    .contatos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .contato-card {
      background: var(--branco);
      border-left: 5px solid var(--bordo);
      padding: 1.5rem;
    }

    .contato-titulo {
      font-family: var(--font-display);
      color: var(--bordo-esc);
      font-size: 1.2rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .contato-item {
      margin-bottom: .8rem;
      line-height: 1.6;
      color: #4a2a2a;
      word-break: break-word;
    }

    .contato-item a {
      color: var(--bordo);
      text-decoration: none;
    }

    .contato-item a:hover {
      text-decoration: underline;
    }

    @media (max-width: 700px) {
      .page {
        padding: 3rem 1.25rem;
      }

      header {
        padding: 1rem 1.25rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <a href="/">← Voltar ao site</a>
  </header>

  <main class="page">

    <div class="label">Contato</div>

    <h1>Fale com o Pajeú</h1>

    <section class="contatos-grid">

      <div class="contato-card">
        <h2 class="contato-titulo">Instagram Nacional</h2>

        <div class="contato-item">
          <a href="https://instagram.com/coletivopajeu" target="_blank">
            @coletivopajeu
          </a>
        </div>
      </div>

      <div class="contato-card">
        <h2 class="contato-titulo">E-mail Nacional</h2>

        <div class="contato-item">
          <a href="mailto:contato@pajeu.org">
            contato@pajeu.org
          </a>
        </div>
      </div>

      <div class="contato-card">
        <h2 class="contato-titulo">Instagram Regional Pará</h2>

        <div class="contato-item">
          <a href="https://instagram.com/pajeupara" target="_blank">
            @pajeupara
          </a>
        </div>
      </div>

      <div class="contato-card">
        <h2 class="contato-titulo"> E-mail Regional Pará</h2>

        <div class="contato-item">
          <a href="mailto:para@pajeu.org">
            para@pajeu.org
          </a>
        </div>
      </div>

      <div class="contato-card">
        <h2 class="contato-titulo">E-mail Regional Ceará</h2>

        <div class="contato-item">
          <a href="mailto:ceara@pajeu.org">
            ceara@pajeu.org
          </a>
        </div>
      </div>

      <div class="contato-card">
        <h2 class="contato-titulo">E-mail Regional Bahia</h2>

        <div class="contato-item">
          <a href="mailto:bahia@pajeu.org">
            bahia@pajeu.org
          </a>
        </div>
      </div>

    </section>

  </main>

</body>
</html>
